source_task: workflow-011
recommended_next_task:
  id: workflow-012
  title: 端到端闭环持续优化
  recommended_agent: CoderAgent
  priority: medium
  risk_level: medium
  goal: 继续基于端到端反馈闭环推进自动化验证与本地 Agent 调度能力。
  scope:
    - 优先评估是否引入本地浏览器截图或 DOM 运行时验证，进一步强化目标效果图自动检查。
    - 或选择 dispatch-002 / feedback-002 推进自动调度覆盖。
    - 保持用例先行，新增或修改功能必须有测试覆盖。
    - 继续产出运行记录、验收记录、实现摘要和下一任务建议。
  out_of_scope:
    - 自动 merge。
    - 引入外部浏览器云服务。
    - 大规模重构流水线架构。
  acceptance_criteria:
    - 新任务有明确目标效果、当前达成、剩余任务和下一步建议。
    - 新增或修改功能有测试覆盖。
    - python -m pytest -q 通过。
alternative_tasks:
  - id: ui-validation-002
    title: 增加目标效果图本地浏览器截图检查
    recommended_agent: TestValidatorAgent
    priority: medium
    risk_level: medium
    reason: 当前检查是静态信号级，下一步可验证真实渲染结果。
  - id: dispatch-002
    title: 支持更多本地 Agent 调度
    recommended_agent: SystemDesignAgent
    priority: medium
    risk_level: medium
    reason: 提升自动执行覆盖率，减少人工拆分任务。
  - id: feedback-002
    title: 把下一轮优化任务接入调度执行
    recommended_agent: CoderAgent
    priority: medium
    risk_level: medium
    reason: 让反馈规划结果更直接进入执行队列。
