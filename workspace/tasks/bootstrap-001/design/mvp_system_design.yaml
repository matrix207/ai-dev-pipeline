system:
  name: ai-dev-pipeline
  stage: mvp
  description: >
    本设计定义本地可运行的多 Agent AI 开发流水线 MVP。
    MVP 以 CLI、结构化产物、任务状态和人工质量门为核心，不引入外部服务。

runtime:
  language: python
  minimum_version: "3.10"
  execution_mode: local_cli
  artifact_backend: local_filesystem
  state_backend: local_json

responsibility_model:
  human:
    purpose: 定义目标、理想效果、范围边界和关键风险决策。
    responsibilities:
      - 审批任务目标和验收标准。
      - 判断本轮范围是否符合 MVP 和项目方向。
      - 审批高风险架构、安全、secret、外部依赖和数据破坏决策。
      - 审批 commit、PR、merge 或 release 等主线变更。
    non_goals:
      - 不要求人工逐行检查每个 Agent 产物。
      - 不要求人工手动执行日常设计、编码、测试和评审步骤。
  agents:
    purpose: 端到端执行设计、开发、测试验证和自动评审。
    responsibilities:
      - 生成结构化分析、设计、实现计划和代码变更。
      - 运行单元测试和本地验收验证。
      - 由独立评审 Agent 评审设计和代码。
      - 将执行过程、测试结果和评审结果写入任务目录。
    non_goals:
      - 不自动绕过人工目标门、风险门或合并门。
      - 不自动执行 PR、merge 或 release。

modules:
  agents:
    purpose: 定义 Agent 的通用接口和后续 Agent 骨架。
    initial_files:
      - agents/base_agent.py
    responsibilities:
      - 接收结构化输入。
      - 返回结构化运行结果。
      - 不直接负责全局任务编排。
    design_notes:
      - BaseAgent 应保持小型抽象，先覆盖 name、run 和 result。
      - 真实模型调用可以在后续任务中通过 client 注入。
  artifacts:
    purpose: 统一读写任务产物。
    initial_files:
      - artifacts/io.py
    responsibilities:
      - 基于相对路径读取 YAML、JSON 和文本文件。
      - 确保写入目录存在。
      - 避免各 Agent 重复处理路径细节。
    design_notes:
      - helper 函数应显式接收仓库根目录或任务目录。
      - 不读取 .env 或 secret 文件。
  state:
    purpose: 保存和读取任务执行状态。
    initial_files:
      - tasks/state.py
    responsibilities:
      - 记录 task id、step、status、artifacts 和 errors。
      - 记录目标、设计评审、测试、代码评审和人工合并质量门状态。
      - 支持状态文件的加载和保存。
      - 为编排器提供最小恢复能力。
  orchestration:
    purpose: 串联本地 MVP workflow。
    initial_files:
      - scripts/run_local_task.py
    responsibilities:
      - 读取 config/pipeline.yaml。
      - 按步骤调用 Agent 或占位实现。
      - 在人工质量门停止并输出下一步提示。
  review:
    purpose: 提供设计评审和代码评审 Agent 骨架。
    initial_files:
      - agents/design_reviewer_agent.py
      - agents/code_reviewer_agent.py
    responsibilities:
      - 读取分析、架构和设计产物。
      - 读取代码变更、测试结果和验收标准。
      - 输出结构化 review JSON。
      - 标记 blocking issues 和建议。

human_gates:
  goal_gate:
    owner: human
    required_before:
      - design_or_implementation
    records:
      - goal_approved
      - acceptance_criteria_approved
      - scope_approved
  risk_gate:
    owner: human
    required_when:
      - introduces_external_service
      - changes_secret_or_auth_handling
      - destructive_file_or_data_operation
      - major_architecture_boundary_change
    records:
      - risk_approved
      - risk_notes
  merge_gate:
    owner: human
    required_before:
      - commit
      - pr
      - merge
      - release
    records:
      - human_merge_approved
      - approval_notes

agent_reviews:
  design_review:
    owner: design_reviewer_agent
    required_before:
      - implementation
    records:
      - design_review_passed
      - blocking_issues
      - non_blocking_issues
  test_validation:
    owner: test_or_validation_agent
    required_before:
      - code_review
    records:
      - tests_passed
      - test_command
      - test_output_summary
  code_review:
    owner: code_reviewer_agent
    required_before:
      - human_merge_gate
    records:
      - code_review_passed
      - blocking_issues
      - recommendations

artifact_contracts:
  task_root_pattern: workspace/tasks/{task_id}
  required_bootstrap_outputs:
    - workspace/tasks/bootstrap-001/analysis/project_context.yaml
    - workspace/tasks/bootstrap-001/architecture/mvp_architecture.md
    - workspace/tasks/bootstrap-001/design/mvp_system_design.yaml
    - workspace/tasks/bootstrap-001/review/design_review.json
    - workspace/tasks/bootstrap-001/final/next_dev_tasks.yaml
  supported_formats:
    - yaml
    - json
    - markdown
    - text

workflow:
  bootstrap:
    task_id: bootstrap-001
    steps:
      - project_analysis
      - mvp_architecture
      - mvp_system_design
      - design_review
      - next_dev_tasks
    human_gate:
      required: true
      before:
        - dev_implementation
  dev_001:
    goal: 实现基础 Agent 抽象和产物 I/O。
    expected_scope:
      - agents/base_agent.py
      - artifacts/io.py
      - tests/
    gates:
      goal_approved: true
      tests_required: true
      human_merge_approval_required: true
  dev_002:
    goal: 实现任务状态管理器。
    expected_scope:
      - tasks/state.py
      - tests/
    required_state_fields:
      - task_id
      - step
      - status
      - artifacts
      - errors
      - gates.goal_approved
      - gates.design_review_passed
      - gates.tests_passed
      - gates.code_review_passed
      - gates.human_merge_approved

quality_rules:
  - 开发任务保持小型、可测试、可评审。
  - 生成与评审职责分离。
  - 所有路径相对仓库根目录。
  - 不硬编码 API key 或 secret。
  - 不自动执行 PR 或 merge 操作。
  - 人工质量门聚焦目标、范围、风险和主线变更审批。
  - Agent 应负责日常设计、开发、测试验证和自动评审。

testing:
  required_commands:
    - python -m pytest -q
  initial_focus:
    - BaseAgent 的输入输出行为。
    - 产物读写 helper 的 YAML、JSON 和文本路径。
    - 任务状态序列化和反序列化。

assumptions:
  - "`dev-001` 可以先使用 mock model/client，不调用外部模型 API。"
  - 早期编排流程以脚本和 CLI 为主。
  - 中文是面向人阅读内容的默认语言。
