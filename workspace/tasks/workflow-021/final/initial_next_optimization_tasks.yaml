task_batch:
  source_task: workflow-021-validation
  source_tasks:
  - workflow-021-validation
  source_feedback_paths:
  - workspace/tasks/workflow-021-validation/final/validation_feedback.json
  language: zh-CN
  status: ready_for_human_review
  goal: 基于自动化验证反馈生成下一轮优化任务。
  planning_mode: enhancement
  alignment_score: 1.0
  blocking_issue_count: 0
  previous_run_record: workspace/tasks/workflow-020/runs/workflow-020-run.yaml
  previous_evidence_decisions:
  - goal_effect_aligned
  - tests_passed
  - dispatch_validated
  - code_review_passed
  - retry_required
  - next_action
  previous_remaining_work_count: 1
tasks:
- id: feedback-002
  title: 把下一轮优化任务接入调度执行
  priority: medium
  recommended_agent: CoderAgent
  risk_level: medium
  human_gate:
    goal_approval_required: true
    risk_approval_required: false
    merge_approval_required: true
  scope:
  - 让 feedback_planning 生成的 next_optimization_tasks.yaml 可直接作为 optimization_dispatch
    的 tasks_path。
  - 运行调度后，父任务能记录来源反馈和被调度任务验证状态。
  - 保留 goal approval 和 merge approval 人工质量门。
  out_of_scope:
  - 接入外部代码托管平台 API。
  - 执行自动 merge。
  acceptance_criteria:
  - optimization_dispatch 可读取 workspace/tasks/feedback-001/final/next_optimization_tasks.yaml。
  - 调度产物能引用来源 validation_feedback。
  - python -m pytest -q 通过。
- id: dispatch-002
  title: 支持更多本地 Agent 调度
  priority: medium
  recommended_agent: ArchitectAgent
  risk_level: medium
  human_gate:
    goal_approval_required: true
    risk_approval_required: false
    merge_approval_required: true
  scope:
  - 为 dispatcher 增加安全的本地 Agent 调度表。
  - 支持 DesignReviewerAgent、TestValidatorAgent、CodeReviewerAgent、GoalEffectValidatorAgent
    的最小调度适配。
  - 不支持的 Agent 继续返回结构化 blocking issue。
  out_of_scope:
  - 调用外部 Agent 服务。
  - 自动 PR 或 merge。
  acceptance_criteria:
  - dispatcher 对支持的 Agent 有测试覆盖。
  - unsupported_agent 路径仍有测试覆盖。
  - python -m pytest -q 通过。
- id: ui-validation-001
  title: 增加目标效果图的自动检查
  priority: medium
  recommended_agent: TestValidatorAgent
  risk_level: low
  human_gate:
    goal_approval_required: true
    risk_approval_required: false
    merge_approval_required: true
  scope:
  - 从 docs/demos/ai_dev_pipeline_demo.html 提取可机读页面结构和核心交互验收点。
  - 让 GoalEffectValidatorAgent 报告目标效果图相关检查结果。
  - 将目标效果检查结果写入 validation_feedback.json。
  out_of_scope:
  - 重做前端 demo。
  - 引入浏览器云服务。
  acceptance_criteria:
  - 目标效果图检查有结构化产物。
  - validation_feedback.json 包含目标效果图检查结论。
  - python -m pytest -q 通过。
- id: roadmap-001
  title: 持续优化路线图产品化
  priority: medium
  recommended_agent: SystemDesignAgent
  risk_level: low
  human_gate:
    goal_approval_required: true
    risk_approval_required: false
    merge_approval_required: true
  scope:
  - 基于已完成的端到端闭环证据，生成下一阶段持续优化路线图。
  - 把候选优化方向、价值、风险和验收方式写入结构化产物。
  - 让人工能按路线图选择下一组高价值任务。
  out_of_scope:
  - 自动创建 PR。
  - 自动 merge。
  - 引入外部项目管理服务。
  acceptance_criteria:
  - 路线图产物能解释为何进入新的持续优化阶段。
  - 路线图不重复 ui-validation-001、feedback-002、dispatch-002。
  - python -m pytest -q 通过。
- id: decision-view-001
  title: 人工决策视图产品化
  priority: medium
  recommended_agent: CoderAgent
  risk_level: low
  human_gate:
    goal_approval_required: true
    risk_approval_required: false
    merge_approval_required: true
  scope:
  - 把目标效果、当前达成、剩余任务和下一步建议汇总为稳定的人读决策视图。
  - 让运行记录、目标效果报告和推荐依据可以一屏追溯。
  - 保留人工审批质量门。
  out_of_scope:
  - 重做前端 demo。
  - 接入外部 BI 或看板服务。
  acceptance_criteria:
  - 决策视图能引用 run record、target_effect_report 和 recommendation_basis。
  - 视图能清楚展示是否可以进入下一阶段。
  - python -m pytest -q 通过。
- id: task-library-001
  title: 优化任务库结构化
  priority: medium
  recommended_agent: RequirementAnalysisAgent
  risk_level: low
  human_gate:
    goal_approval_required: true
    risk_approval_required: false
    merge_approval_required: true
  scope:
  - 整理可复用优化任务模板，区分基础能力、产品化表达和长期演进。
  - 为每类任务补充价值、触发条件、推荐 Agent 和验收标准。
  - 支持后续 planner 从任务库选择下一组任务。
  out_of_scope:
  - 引入外部任务系统。
  - 自动修改业务代码。
  acceptance_criteria:
  - 任务库产物包含分类、触发条件和验收标准。
  - 任务库不重复旧三项已完成任务。
  - python -m pytest -q 通过。
human_gate:
  required_before_starting_dev: true
  required_before_pr_or_merge: true
  role: 人确认优化方向；Agent 执行设计、开发、验证和评审。
