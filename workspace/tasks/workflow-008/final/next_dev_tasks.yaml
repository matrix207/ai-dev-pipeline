source_task: workflow-008
recommended_next_task:
  id: workflow-009
  title: 端到端闭环任务推进命令
  recommended_agent: CoderAgent
  priority: medium
  risk_level: medium
  goal: 提供一个明确的继续执行命令，读取审批后动作控制结果，在 allowed 时推进下一阶段，在 blocked 或 approval_required 时给出可执行修正建议。
  scope:
    - 新增或扩展 CLI 参数，用于检查指定 run_id 是否允许继续。
    - approved 且 can_continue=true 时输出下一阶段任务和建议命令。
    - rejected、blocked、approval_required、dry_run 状态必须阻止继续。
    - 输出结构化 JSON 和人类可读摘要。
    - 为命令行为补充测试用例。
  out_of_scope:
    - 自动 merge。
    - 自动调用外部 CI/CD 服务。
    - 自动绕过人工审批质量门。
  acceptance_criteria:
    - approved 状态下 continue 命令返回 0，并输出下一阶段任务。
    - rejected 状态下 continue 命令返回非 0，并输出审批意见或修正建议。
    - approval_required 状态下 continue 命令返回非 0，并提示补充审批记录。
    - dry-run 记录不能被 continue。
    - python -m pytest -q 通过。
