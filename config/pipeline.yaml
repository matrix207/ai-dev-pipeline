agent_config:
  project_name: ai-dev-pipeline
  workspace_root: ./workspace
  artifact_root: ./workspace/tasks
  task_timeout_seconds: 1800
  max_review_rounds: 3
  human_gate_required: true

quality_gate:
  required_evidence:
    - goal_effect_aligned
    - tests_passed
    - dispatch_validated
    - code_review_passed
    - next_action
  missing_evidence: blocking
  failed_evidence: blocking
  human_approval_required: true

models:
  codex:
    provider: openai
    usage: local_coding_agent
    auth: chatgpt_or_api_key

workflows:
  bootstrap:
    task_id: bootstrap-001
    steps:
      - project_analysis
      - mvp_architecture
      - mvp_system_design
      - design_review
      - next_dev_tasks
  local_dev:
    task_id: dev-003
    steps:
      - load_config
      - run_placeholder_agent
      - write_state
      - human_gate
    human_gate_required: true
  bootstrap_design_review:
    task_id: bootstrap-001
    steps:
      - design_review
    human_gate_required: true
  coding_plan:
    task_id: dev-005
    steps:
      - coding_plan
    human_gate_required: true
  automated_validation:
    task_id: validation-001
    steps:
      - test_validation
      - code_review
      - goal_effect_validation
    human_gate_required: true
  optimization_planning:
    task_id: optimization-001
    steps:
      - optimization_planning
    human_gate_required: true
  feedback_planning:
    task_id: feedback-001
    steps:
      - name: optimization_planning
        feedback_paths:
          - workspace/tasks/dispatch-001/final/validation_feedback.json
          - workspace/tasks/dispatch-validation-demo/final/validation_feedback.json
    human_gate_required: true
  feedback_dispatch:
    task_id: feedback-dispatch-001
    steps:
      - name: optimization_dispatch
        tasks_path: workspace/tasks/feedback-001/final/next_optimization_tasks.yaml
      - dispatched_task_validation
      - test_validation
      - code_review
      - goal_effect_validation
    human_gate_required: true
  agent_dispatch:
    task_id: dispatch-002
    steps:
      - name: optimization_dispatch
        tasks_path: workspace/tasks/dispatch-002/input/dispatch_tasks.yaml
      - dispatched_task_validation
      - test_validation
      - code_review
      - goal_effect_validation
    human_gate_required: true
  ui_validation:
    task_id: ui-validation-001
    steps:
      - test_validation
      - code_review
      - goal_effect_validation
    human_gate_required: true
  dispatch_batch:
    task_id: dispatch-003
    steps:
      - name: optimization_dispatch
        tasks_path: workspace/tasks/dispatch-003/input/dispatch_tasks.yaml
        dispatch_all: true
      - dispatched_task_validation
      - test_validation
      - code_review
      - goal_effect_validation
    human_gate_required: true
  evidence_review:
    task_id: review-001
    steps:
      - test_validation
      - name: code_review
        task_definition_path: workspace/tasks/review-001/input/review_tasks.yaml
      - goal_effect_validation
    human_gate_required: true
  end_to_end_dispatch:
    task_id: workflow-001-dispatch
    steps:
      - name: optimization_dispatch
        dispatch_all: true
      - dispatched_task_validation
      - test_validation
      - code_review
      - goal_effect_validation
    human_gate_required: true
  end_to_end_review:
    task_id: workflow-001-review
    steps:
      - test_validation
      - code_review
      - goal_effect_validation
    human_gate_required: true
  optimization_execution:
    task_id: planning-003
    steps:
      - optimization_execution_plan
    human_gate_required: true
  optimization_dispatch:
    task_id: dispatch-001
    steps:
      - name: optimization_dispatch
        tasks_path: workspace/tasks/dispatch-001/input/dispatch_tasks.yaml
      - dispatched_task_validation
      - test_validation
      - code_review
      - goal_effect_validation
    human_gate_required: true

persistence:
  artifact_backend: local_filesystem
  state_backend: local_json
